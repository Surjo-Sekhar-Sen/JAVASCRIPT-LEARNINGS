<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM New Element</title>
</head>
<body style = "background-color:black; color: white">
</body>
<script>
    const div = document.createElement("div");
    console.log(div);
    div.className = "Div-class";
    div.id = "Div-id";
    div.setAttribute("title", "This is a new div element");
    div.style.color = "yellow";
    div.style.fontSize = "20px";
    div.style.backgroundColor = "blue";
    div.innerText = "This is a new div element.\n";
    const text = document.createTextNode("This is next written line.");
    div.appendChild(text);
    document.body.appendChild(div);

    function create(){
        for(let i = 0; i < 5; i++){
            const val = document.createElement("div");
            val.id = Math.round(Math.random() * 10 + 1);
            val.className = "Surjo";
            val.style.backgroundColor = "green";
            val.style.color = "white";
            val.textContent = `This is new element ${i+1} added`;
            // console.log(val);
            document.body.appendChild(val);
        }
    }
    create();

    function createcolour(){
        const arr = ["yellow", "green", "blue", "red", "pink"]
        for(let i = 0; i < 5; i++){
            const val2 = document.createElement("div");
            val2.style.backgroundColor = arr[i];
            val2.style.color = arr[i+1];
            val2.textContent = `This is new element ${i+1} added`;
            console.log(val2);
            document.body.appendChild(val2);
        }
    }
    createcolour();
</script>
</html>
